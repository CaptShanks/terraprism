name: Bug Report
description: Report a bug in Terraprism
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below to help us understand and reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug
      placeholder: |
        1. Run `terraform plan -json | terraprism`
        2. Navigate to resource X
        3. Press Enter
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Terraprism Version
      description: Output of `terraprism --version`
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: plan-sample
    attributes:
      label: Terraform Plan Sample
      description: If applicable, provide a sanitized snippet of the terraform plan JSON that triggers the bug
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Any relevant error messages or terminal output
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might be helpful
