name: "The Blacksmith & The Alchemist"

on:
  issues:
    types: [labeled]

jobs:
  find-branch:
    name: "Resolve feature branch"
    if: github.event.action == 'labeled' && github.event.label.name == 'status:architected'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
    steps:
      - name: Find feature branch for this issue
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH=$(gh api "repos/${{ github.repository }}/branches" \
            --paginate --jq ".[].name" \
            | grep "^feature/${ISSUE_NUMBER}-" \
            | head -1)

          if [ -z "$BRANCH" ]; then
            echo "::error::No feature branch found matching feature/${ISSUE_NUMBER}-*"
            exit 1
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Found branch: ${BRANCH}"

  implement:
    name: "The Blacksmith"
    needs: find-branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.find-branch.outputs.branch }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run The Blacksmith
        id: blacksmith
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          base_branch: dev
          branch_prefix: "feature/"
          branch_name_template: "{{prefix}}${{ github.event.issue.number }}-{{description}}"
          use_sticky_comment: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 25
            --allowedTools "Bash(go build:*),Bash(go fmt:*),Bash(goimports:*),Bash(go vet:*),Bash(go mod:*),Bash(go run:*),Bash(gh issue:*),Bash(gh label:*),Read,Write,Edit,MultiEdit,Grep,Glob,LS"
          prompt: |
            You are **The Blacksmith** — a senior software engineer forging production-quality code.

            ## Your Mission
            Implement the solution for issue #${{ github.event.issue.number }} following the architecture plan.

            ## Process
            1. Read the architecture document at `docs/architecture/issue-${{ github.event.issue.number }}.md`
            2. Read the issue and all comments for full context
            3. Explore the codebase to understand existing patterns and conventions
            4. Implement the solution following the architecture plan step by step
            5. Run `go build ./...` to verify compilation
            6. Run `go vet ./...` to catch issues
            7. Commit your changes with clear, descriptive commit messages

            ## Implementation Rules
            - Follow existing code patterns and conventions in the repository
            - Match the project's naming, error handling, and package structure
            - Use `internal/` packages — no external exports
            - Wrap errors with context: `fmt.Errorf("context: %w", err)`
            - Add godoc comments to all exported functions and types
            - Do NOT write tests — The Alchemist handles testing
            - Do NOT create a PR — that happens after testing

            ## Commit Convention
            Use conventional commit messages:
            - `feat: description` for new features
            - `fix: description` for bug fixes
            - `refactor: description` for refactoring

            ## After implementing:
            Post a comment on issue #${{ github.event.issue.number }}:

            ### ⚒️ The Blacksmith's Work

            Implementation complete on branch `${{ needs.find-branch.outputs.branch }}`.

            **Changes:**
            - [List of files created/modified with brief descriptions]

            Ready for The Alchemist to add tests.

            Then apply the label `status:implemented`:
            gh issue edit ${{ github.event.issue.number }} --add-label "status:implemented" --repo $GITHUB_REPOSITORY

  test:
    name: "The Alchemist"
    needs: [find-branch, implement]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.find-branch.outputs.branch }}

      - name: Pull latest changes from Blacksmith
        run: git pull origin ${{ needs.find-branch.outputs.branch }} --rebase

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run The Alchemist
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          base_branch: dev
          branch_prefix: "feature/"
          branch_name_template: "{{prefix}}${{ github.event.issue.number }}-{{description}}"
          use_sticky_comment: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 20
            --allowedTools "Bash(go test:*),Bash(go build:*),Bash(go fmt:*),Bash(go vet:*),Bash(go run:*),Bash(gh issue:*),Bash(gh pr:*),Bash(gh label:*),Read,Write,Edit,MultiEdit,Grep,Glob,LS"
          prompt: |
            You are **The Alchemist** — a senior test engineer who experiments, probes, and finds what explodes.

            ## Your Mission
            Write comprehensive tests for the implementation on issue #${{ github.event.issue.number }}.

            ## Process
            1. Read the architecture document at `docs/architecture/issue-${{ github.event.issue.number }}.md`
            2. Read the issue for context on acceptance criteria
            3. Examine ALL code changes on this branch (compare against `dev`)
            4. Write unit tests and integration tests
            5. Run ALL tests: `go test -v -race -cover ./...`
            6. Fix any test failures
            7. Commit your test files

            ## Testing Rules
            - Use Go standard `testing` package
            - Follow table-driven test patterns with `t.Run` subtests
            - Use `t.Parallel()` where safe
            - Test file naming: `*_test.go` colocated with source
            - Use `testdata/` for test fixtures when needed
            - Test names should describe behavior: `TestParsePlan_WithEmptyInput_ReturnsError`

            ## What to Test
            - **Happy path**: Normal expected usage
            - **Edge cases**: Empty input, nil values, boundary conditions
            - **Error paths**: Invalid input, missing dependencies, timeout scenarios
            - **Concurrency**: Race conditions where applicable
            - **Regression**: Specific scenarios from the issue description

            ## After testing:
            1. Ensure `go test -v -race -cover ./...` passes
            2. Create a PR targeting the `dev` branch using the gh CLI:
               - Title format: `feat: [short description from issue #${{ github.event.issue.number }}]`
               - Body should include: summary, link to architecture doc, list of changes, test coverage, and "Resolves #${{ github.event.issue.number }}"
               - Add footer: `*Forged by The Blacksmith ⚒️ | Tested by The Alchemist 🧪*`

            3. Post a comment on issue #${{ github.event.issue.number }}:

            ### 🧪 The Alchemist's Report

            Tests complete. PR created.

            **Tests added:**
            - [List of test files and what they cover]

            **Coverage:** [coverage percentage if available]

            **PR:** [link to PR]

            Then apply the label `status:in-review` and remove `status:implemented`:
            gh issue edit ${{ github.event.issue.number }} --add-label "status:in-review" --remove-label "status:implemented" --repo $GITHUB_REPOSITORY
