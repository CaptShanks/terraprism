name: "The Blacksmith & The Alchemist"

on:
  issues:
    types: [labeled]

jobs:
  find-branch:
    name: "Resolve feature branch"
    if: github.event.action == 'labeled' && github.event.label.name == 'status:architected'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
    steps:
      - name: Find feature branch for this issue
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH=$(gh api "repos/${{ github.repository }}/branches" \
            --paginate --jq ".[].name" \
            | grep "^feature/${ISSUE_NUMBER}-" \
            | head -1)

          if [ -z "$BRANCH" ]; then
            echo "::error::No feature branch found matching feature/${ISSUE_NUMBER}-*"
            exit 1
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Found branch: ${BRANCH}"

  implement:
    name: "The Blacksmith"
    needs: find-branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.find-branch.outputs.branch }}

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run The Blacksmith
        id: blacksmith
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          use_sticky_comment: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 15
            --allowedTools "Read,Write,Edit,MultiEdit,Glob,Grep,LS,Bash(git:*),Bash(go:*),Bash(goimports:*),Bash(gh:*),Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(find:*)"
          prompt: |
            You are **The Blacksmith** — implement the solution for issue #${{ github.event.issue.number }}.
            Branch: ${{ needs.find-branch.outputs.branch }}

            1. Read `docs/architecture/issue-${{ github.event.issue.number }}.md` for the plan
            2. Implement the solution following existing code patterns
            3. Run `go build ./...` and `go vet ./...`
            4. Commit and push:
               git add -A && git commit -m "feat: implement issue #${{ github.event.issue.number }}" && git push
            5. Do NOT write tests or create a PR
            6. Comment on the issue:
               gh issue comment ${{ github.event.issue.number }} --repo CaptShanks/terraprism --body "### The Blacksmith's Work\nImplementation complete on branch \`${{ needs.find-branch.outputs.branch }}\`. Ready for The Alchemist."
            7. Apply label:
               gh issue edit ${{ github.event.issue.number }} --add-label "status:implemented" --repo CaptShanks/terraprism

  test:
    name: "The Alchemist"
    needs: [find-branch, implement]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.find-branch.outputs.branch }}

      - name: Pull latest changes from Blacksmith
        run: git pull origin ${{ needs.find-branch.outputs.branch }} --rebase

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run The Alchemist
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          use_sticky_comment: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 25
            --allowedTools "Read,Write,Edit,MultiEdit,Glob,Grep,LS,Bash(git:*),Bash(go:*),Bash(gh:*),Bash(mkdir:*),Bash(ls:*),Bash(cat:*),Bash(find:*)"
          prompt: |
            You are **The Alchemist** — write tests for issue #${{ github.event.issue.number }}.
            Branch: ${{ needs.find-branch.outputs.branch }}

            1. Read `docs/architecture/issue-${{ github.event.issue.number }}.md`
            2. Write unit tests using table-driven patterns with t.Run
            3. Run `go test -v -race -cover ./...` and fix failures
            4. Commit and push test files:
               git add -A && git commit -m "test: add tests for issue #${{ github.event.issue.number }}" && git push
            5. Create a PR targeting dev:
               gh pr create --base dev --title "feat: [description] (resolves #${{ github.event.issue.number }})" --body "Resolves #${{ github.event.issue.number }}" --repo CaptShanks/terraprism
            6. Comment on the issue:
               gh issue comment ${{ github.event.issue.number }} --repo CaptShanks/terraprism --body "### The Alchemist's Report\nTests complete. PR created."
            7. Apply label:
               gh issue edit ${{ github.event.issue.number }} --add-label "status:in-review" --remove-label "status:implemented" --repo CaptShanks/terraprism
