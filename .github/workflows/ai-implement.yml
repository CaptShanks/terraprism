name: "The Blacksmith & The Alchemist"

on:
  issues:
    types: [labeled]

jobs:
  find-branch:
    name: "Resolve feature branch"
    if: github.event.action == 'labeled' && github.event.label.name == 'status:architected'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
    steps:
      - name: Find feature branch for this issue
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH=$(gh api "repos/${{ github.repository }}/branches" \
            --paginate --jq ".[].name" \
            | grep "^feature/${ISSUE_NUMBER}-" \
            | head -1)

          if [ -z "$BRANCH" ]; then
            echo "::error::No feature branch found matching feature/${ISSUE_NUMBER}-*"
            exit 1
          fi
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          echo "Found branch: ${BRANCH}"

  implement:
    name: "The Blacksmith"
    needs: find-branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.find-branch.outputs.branch }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run The Blacksmith
        id: blacksmith
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          base_branch: dev
          use_sticky_comment: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 15
            --allowedTools "Read,Write,Edit,Bash(go build:*),Bash(go fmt:*),Bash(goimports:*),Bash(go vet:*),Bash(go mod:*),Bash(gh:*)"
          prompt: |
            You are **The Blacksmith** — implement the solution for issue #${{ github.event.issue.number }}.

            1. Read `docs/architecture/issue-${{ github.event.issue.number }}.md` for the plan
            2. Implement the solution following existing code patterns
            3. Run `go build ./...` and `go vet ./...`
            4. Do NOT write tests or create a PR
            5. Run: gh issue comment ${{ github.event.issue.number }} --repo CaptShanks/terraprism --body "### The Blacksmith's Work\nImplementation complete. Ready for The Alchemist."
            6. Run: gh issue edit ${{ github.event.issue.number }} --add-label "status:implemented" --repo CaptShanks/terraprism

  test:
    name: "The Alchemist"
    needs: [find-branch, implement]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.find-branch.outputs.branch }}

      - name: Pull latest changes from Blacksmith
        run: git pull origin ${{ needs.find-branch.outputs.branch }} --rebase

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run The Alchemist
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          base_branch: dev
          use_sticky_comment: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 15
            --allowedTools "Read,Write,Edit,Bash(go test:*),Bash(go build:*),Bash(go fmt:*),Bash(go vet:*),Bash(gh:*)"
          prompt: |
            You are **The Alchemist** — write tests for issue #${{ github.event.issue.number }}.

            1. Read `docs/architecture/issue-${{ github.event.issue.number }}.md`
            2. Write unit tests using table-driven patterns with t.Run
            3. Run `go test -v -race -cover ./...` and fix failures
            4. Create a PR: gh pr create --base dev --title "feat: [description] (resolves #${{ github.event.issue.number }})" --body "..." --repo CaptShanks/terraprism
            5. Run: gh issue comment ${{ github.event.issue.number }} --repo CaptShanks/terraprism --body "### The Alchemist's Report\nTests complete. PR created."
            6. Run: gh issue edit ${{ github.event.issue.number }} --add-label "status:in-review" --remove-label "status:implemented" --repo CaptShanks/terraprism
