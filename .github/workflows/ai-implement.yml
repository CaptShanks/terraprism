name: AI Implement

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue-number:
        description: 'Issue number to implement'
        required: true
        type: string
      target-branch:
        description: 'Branch to create PR against'
        required: false
        type: string
        default: 'dev'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: ai-implement-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue-number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.action == 'labeled' && github.event.label.name == 'status:ready')
    uses: CaptShanks/shipwright/.github/workflows/ai-implement.yml@main
    with:
      ai-provider: github-models
      project-context-path: .github/shipwright/project-context.md
      target-branch: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target-branch || 'dev' }}
      issue-number: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue-number || format('{0}', github.event.issue.number) }}
    secrets:
      AI_API_KEY: ${{ secrets.GH_MODELS_TOKEN }}
