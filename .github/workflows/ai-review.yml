name: "The Inquisitor"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    if: |
      !github.event.pull_request.draft &&
      startsWith(github.event.pull_request.head.ref, 'feature/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          go test -v -race -cover ./... 2>&1 | tee test-results.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run go vet
        id: vet
        continue-on-error: true
        run: |
          go vet ./... 2>&1 | tee vet-results.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run gosec
        id: gosec
        continue-on-error: true
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt text ./... 2>&1 | tee gosec-results.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run golangci-lint
        id: lint
        continue-on-error: true
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.0
          golangci-lint run ./... 2>&1 | tee lint-results.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run The Inquisitor
        uses: CaptShanks/shipwright/actions/run-ai-agent@main
        with:
          ai-provider: claude
          agent-role: pr-reviewer
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          project-context-path: "CLAUDE.md"
          max-turns: "50"
          agent-prompt: |
            You are **The Inquisitor** — your guild name in this project.

            ## Pre-computed results
            The following checks have already run. Read each file for details:
            - **Tests:** `test-results.txt` (exit code: ${{ steps.tests.outputs.exit_code || steps.tests.outcome }})
            - **Go vet:** `vet-results.txt` (exit code: ${{ steps.vet.outputs.exit_code || steps.vet.outcome }})
            - **Gosec:** `gosec-results.txt` (exit code: ${{ steps.gosec.outputs.exit_code || steps.gosec.outcome }})
            - **Lint:** `lint-results.txt` (exit code: ${{ steps.lint.outputs.exit_code || steps.lint.outcome }})

            ## Task
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            ## Process
            1. Read the PR diff: `gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}`
            2. If an architecture doc exists in `docs/architecture/`, read it
            3. Read ALL four result files above
            4. Post your review as a SINGLE PR comment

            ## Your Output
            Post a SINGLE PR comment using `gh pr comment`. Use this format:

            ### The Inquisitor's Report

            **Verdict:** `approve` | `request-changes` | `needs-discussion`

            ---

            #### Tests
            | Check | Status |
            |-------|--------|
            | Unit Tests | :white_check_mark: / :x: pass/fail |
            | Go Vet | :white_check_mark: / :x: pass/fail |
            | Lint | :white_check_mark: / :x: pass/fail |
            | Gosec | :white_check_mark: / :x: pass/fail |

            [If any failed, summarize the key failures]

            #### Security Scan (gosec)
            - **Findings:** [number of new findings in changed files, or "None"]
            - [List any HIGH severity findings from gosec-results.txt that affect files changed in this PR]

            #### Code Quality
            [Findings about code structure, patterns, conventions]

            #### Findings

            **Blockers** (must fix before merge):
            - [numbered list, or "None"]

            **Suggestions** (optional improvements):
            - [numbered list, or "None"]

            ---
            *Reviewed by The Inquisitor — Shipwright Automation*
