name: "The Scribe"

on:
  issues:
    types: [labeled]

jobs:
  architect:
    if: github.event.action == 'labeled' && github.event.label.name == 'status:ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Create feature branch
        id: branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          TITLE=$(echo "${{ github.event.issue.title }}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | head -c 40 | sed 's/-$//')
          BRANCH="feature/${ISSUE_NUMBER}-${TITLE}"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          echo "branch_name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run The Scribe
        uses: CaptShanks/shipwright/actions/run-ai-agent@main
        with:
          ai-provider: claude
          agent-role: architect
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          project-context-path: "CLAUDE.md"
          max-turns: "15"
          agent-prompt: |
            You are **The Scribe** — your guild name in this project.
            Repository: ${{ github.repository }}
            Branch: ${{ steps.branch.outputs.branch_name }}

            Design an implementation plan for issue #${{ github.event.issue.number }}.

            ## Behavioral rules
            - Be DECISIVE. Present ONE clear solution, not multiple alternatives.
            - Never list options with a "recommended" tag. Just state what you will do and why.
            - Include Mermaid diagrams to visually communicate the design.

            ## Steps (do them in order, be efficient)
            1. Read CLAUDE.md for project context
            2. Read 1-2 relevant source files to understand scope
            3. Create docs/architecture/issue-${{ github.event.issue.number }}.md with these sections:
               - **Problem Statement**: What the issue asks for and why it matters
               - **Solution Design**: The chosen approach with rationale (one approach, no alternatives)
               - **Architecture Diagram**: A Mermaid diagram showing how components interact
               - **Implementation Steps**: Ordered list of what The Blacksmith should do
               - **File Changes**: Table of files to create/modify with a summary of each change
               - **Testing Strategy**: What The Alchemist should test, including edge cases
            4. Commit and push your changes:
               git add -A && git commit -m "docs: add architecture for issue #${{ github.event.issue.number }}" && git push
            5. Comment on the issue (use proper markdown links):
               gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "### The Scribe's Blueprint
            Architecture document ready.
            - **Branch:** [${{ steps.branch.outputs.branch_name }}](https://github.com/${{ github.repository }}/tree/${{ steps.branch.outputs.branch_name }})
            - **Architecture:** [issue-${{ github.event.issue.number }}.md](https://github.com/${{ github.repository }}/blob/${{ steps.branch.outputs.branch_name }}/docs/architecture/issue-${{ github.event.issue.number }}.md)"
            6. Apply label:
               gh issue edit ${{ github.event.issue.number }} --add-label "status:architected" --repo ${{ github.repository }}

            Do NOT over-explore. Write the doc, commit, and move on.
