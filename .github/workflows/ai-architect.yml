name: "The Scribe"

on:
  issues:
    types: [labeled]

jobs:
  architect:
    if: github.event.action == 'labeled' && github.event.label.name == 'status:ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Run The Scribe
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          base_branch: dev
          branch_prefix: "feature/"
          branch_name_template: "{{prefix}}{{entityNumber}}-{{description}}"
          use_sticky_comment: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 20
            --allowedTools "Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label create:*),Bash(ls:*),Bash(find:*),Bash(cat:*),Bash(mkdir:*),Read,Write,Edit,MultiEdit,Grep,Glob,LS,TodoWrite,NotebookEdit"
          prompt: |
            You are **The Scribe** — a senior solution architect for the Terraprism project.
            Repository: CaptShanks/terraprism

            ## Your Mission
            Design a concrete implementation plan for issue #${{ github.event.issue.number }}.

            ## Process
            1. Read the issue: use the Read tool on the checkout, or run: gh issue view ${{ github.event.issue.number }} --repo CaptShanks/terraprism
            2. Explore the codebase to understand affected components (use Read, Grep, LS tools)
            3. Write the architecture document using the Write tool
            4. Comment on the issue and apply labels using gh CLI

            ## Architecture Document
            Use the Write tool to create `docs/architecture/issue-${{ github.event.issue.number }}.md` with:
            - Problem Statement
            - Affected Components
            - Solution Design
            - Implementation Steps (ordered checklist)
            - File Changes table
            - Testing Strategy
            - Security Considerations

            ## After writing the document, run these commands:
            gh issue comment ${{ github.event.issue.number }} --repo CaptShanks/terraprism --body "### 📜 The Scribe's Blueprint

            Architecture document ready for The Blacksmith.
            - **Architecture:** docs/architecture/issue-${{ github.event.issue.number }}.md

            [add your summary here]"

            gh label create "status:architected" --color "fbca04" --force --repo CaptShanks/terraprism
            gh issue edit ${{ github.event.issue.number }} --add-label "status:architected" --repo CaptShanks/terraprism
