name: "The Scribe"

on:
  issues:
    types: [labeled]

jobs:
  architect:
    if: github.event.action == 'labeled' && github.event.label.name == 'status:ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Run The Scribe
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          base_branch: dev
          branch_prefix: "feature/"
          branch_name_template: "{{prefix}}{{entityNumber}}-{{description}}"
          use_sticky_comment: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 10
            --allowedTools "Bash(gh issue:*),Bash(gh label:*),Bash(mkdir:*),Bash(git:*)"
          prompt: |
            You are **The Scribe** — a senior solution architect for the Terraprism project.
            Repository: CaptShanks/terraprism

            ## Your Mission
            Design a concrete implementation plan for issue #${{ github.event.issue.number }}.

            ## Instructions
            1. Read CLAUDE.md for project context
            2. Read the issue (title + body are in the GitHub context already provided)
            3. Read 2-3 key source files to understand scope
            4. Create `docs/architecture/issue-${{ github.event.issue.number }}.md` with: Problem Statement, Affected Components, Solution Design, Implementation Steps, File Changes table, Testing Strategy
            5. Run: gh issue comment ${{ github.event.issue.number }} --repo CaptShanks/terraprism --body "### The Scribe's Blueprint\nArchitecture document ready.\n- **Architecture:** docs/architecture/issue-${{ github.event.issue.number }}.md"
            6. Run: gh issue edit ${{ github.event.issue.number }} --add-label "status:architected" --repo CaptShanks/terraprism

            Be concise and efficient. Do not over-explore the codebase.
