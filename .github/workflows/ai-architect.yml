name: "The Scribe"

on:
  issues:
    types: [labeled]

jobs:
  architect:
    if: github.event.action == 'labeled' && github.event.label.name == 'status:ready'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Run The Scribe
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot]"
          base_branch: dev
          branch_prefix: "feature/"
          branch_name_template: "{{prefix}}{{entityNumber}}-{{description}}"
          use_sticky_comment: "true"
          show_full_output: "true"
          claude_args: |
            --model claude-sonnet-4-20250514
            --max-turns 15
            --allowedTools "Bash(gh:*),Bash(mkdir:*),Bash(git:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Write,Edit"
          prompt: |
            You are **The Scribe** — a senior solution architect.
            Repository: CaptShanks/terraprism

            Design an implementation plan for issue #${{ github.event.issue.number }}.

            Steps (do them in order, be efficient):
            1. Read CLAUDE.md
            2. Read 1-2 relevant source files
            3. Create docs/architecture/issue-${{ github.event.issue.number }}.md with: Problem Statement, Affected Components, Solution Design, Implementation Steps, File Changes table, Testing Strategy
            4. gh issue comment ${{ github.event.issue.number }} --repo CaptShanks/terraprism --body "### The Scribe's Blueprint\nArchitecture document ready.\n- **Architecture:** docs/architecture/issue-${{ github.event.issue.number }}.md"
            5. gh issue edit ${{ github.event.issue.number }} --add-label "status:architected" --repo CaptShanks/terraprism

            Do NOT over-explore. Write the doc and move on.
