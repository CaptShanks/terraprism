name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    uses: CaptShanks/shipwright/.github/workflows/ai-pr-review.yml@main
    with:
      ai-provider: github-models
      project-context-path: .github/shipwright/project-context.md
